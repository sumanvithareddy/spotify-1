<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Melody</title>

    <link rel="stylesheet" href="css/signup.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <div class="left">

        <div class="overlay">

            <h1>Melody</h1>

            <p>

                Create your account and enjoy
                unlimited music streaming.

            </p>

        </div>

    </div>

    <div class="right">

        <form id="signupForm">

            <h2>Create Account</h2>

            <p>Join Melody today</p>

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                type="text"
                id="username"
                placeholder="Username"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="Email"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required>

            </div>

            <div class="terms">

                <label>

                    <input type="checkbox" required>

                    I agree to the Terms & Conditions

                </label>

            </div>

            <button type="submit">

                Create Account

            </button>

            <div class="divider">

                OR

            </div>

            <div class="social">

                <button type="button">

                    <i class="fa-brands fa-google"></i>

                    Google

                </button>

                <button type="button">

                    <i class="fa-brands fa-facebook"></i>

                    Facebook

                </button>

            </div>

            <p class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </p>

        </form>

    </div>

</div>

<script src="js/signup.js"></script>

</body>
</html>
