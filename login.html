<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Melody</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="left">

            <div class="overlay">

                <h1>Melody</h1>

                <p>

                    Stream millions of songs anywhere,
                    anytime.

                </p>

            </div>

        </div>

        <div class="right">

            <form id="loginForm">

                <h2>Welcome Back</h2>

                <p>Login to continue</p>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

                <button type="submit">

                    Login

                </button>

                <div class="divider">

                    OR

                </div>

                <div class="social">

                    <button type="button">

                        <i class="fa-brands fa-google"></i>

                        Google

                    </button>

                    <button type="button">

                        <i class="fa-brands fa-facebook"></i>

                        Facebook

                    </button>

                </div>

                <p class="signup">

                    Don't have an account?

                    <a href="signup.html">

                        Sign Up

                    </a>

                </p>

            </form>

        </div>

    </div>

    <script src="js/auth.js"></script>

</body>

</html>
